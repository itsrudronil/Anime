<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Live TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        select { width: 90%; max-width: 400px; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; }
        video { width: 100%; max-width: 800px; background: black; display: block; margin: 20px auto; border-radius: 8px; border: 2px solid #334155; }
    </style>
</head>
<body>

    <h2>Live TV Player</h2>
    
    <select id="catSelect" onchange="loadChannels()">
        <option>ক্যাটাগরি লোড হচ্ছে...</option>
    </select>
    
    <select id="channelSelect" onchange="playChannel()">
        <option>চ্যানেল সিলেক্ট করুন...</option>
    </select>

    <video id="video" controls autoplay></video>

    <script>
        const BASE_URL = 'http://starter.nvisionbd.net';
        const USERNAME = 'talukderrudronil';
        const PASSWORD = 'talRudronil8';

        async function fetchProxy(url) {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            return JSON.parse(data.contents);
        }

        async function loadCategories() {
            try {
                const url = `${BASE_URL}/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=get_live_categories`;
                const data = await fetchProxy(url);
                const catSelect = document.getElementById('catSelect');
                catSelect.innerHTML = '<option>ক্যাটাগরি সিলেক্ট করুন</option>';
                data.forEach(cat => {
                    let opt = document.createElement('option');
                    opt.value = cat.category_id;
                    opt.innerHTML = cat.category_name;
                    catSelect.appendChild(opt);
                });
            } catch (e) {
                alert("ক্যাটাগরি লোড হচ্ছে না! ইন্টারনেটে সমস্যা হতে পারে।");
            }
        }

        async function loadChannels() {
            const catId = document.getElementById('catSelect').value;
            const url = `${BASE_URL}/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=get_live_streams&category_id=${catId}`;
            const data = await fetchProxy(url);
            
            const chanSelect = document.getElementById('channelSelect');
            chanSelect.innerHTML = '<option>চ্যানেল সিলেক্ট করুন...</option>';
            data.forEach(stream => {
                let opt = document.createElement('option');
                opt.value = stream.stream_id;
                opt.innerHTML = stream.name;
                chanSelect.appendChild(opt);
            });
        }

        function playChannel() {
            const streamId = document.getElementById('channelSelect').value;
            const videoUrl = `${BASE_URL}/live/${USERNAME}/${PASSWORD}/${streamId}.m3u8`;
            const video = document.getElementById('video');
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(videoUrl);
                hls.attachMedia(video);
                video.play();
            }
        }

        loadCategories();
    </script>
</body>
</html>
