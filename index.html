<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Live TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 15px; text-align: center; }
        input, select { width: 100%; max-width: 500px; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        video { width: 100%; max-width: 800px; background: black; display: block; margin: 0 auto; border-radius: 8px; border: 2px solid #334155; }
    </style>
</head>
<body>

    <h2>Live TV Player</h2>
    <input type="text" id="searchInput" placeholder="চ্যানেল সার্চ করুন..." onkeyup="filterChannels()">
    <select id="channelSelect" onchange="playChannel()">
        <option>চ্যানেল লোড হচ্ছে...</option>
    </select>
    <video id="video" controls autoplay></video>

    <script>
        const API_URL = 'http://starter.nvisionbd.net/player_api.php?username=talukderrudronil&password=talRudronil8&action=get_live_streams';
        let allChannels = [];

        async function fetchChannels() {
            try {
                // ব্রাউজারের CORS সমস্যা এড়াতে প্রক্সি ব্যবহার করছি
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`);
                const data = await response.json();
                allChannels = JSON.parse(data.contents);
                renderSelect(allChannels);
            } catch (e) {
                alert("চ্যানেল লোড হতে সমস্যা হয়েছে!");
            }
        }

        function renderSelect(channels) {
            const select = document.getElementById('channelSelect');
            select.innerHTML = '<option>চ্যানেল সিলেক্ট করুন</option>';
            channels.forEach(ch => {
                let opt = document.createElement('option');
                opt.value = ch.stream_id;
                opt.innerHTML = ch.name;
                select.appendChild(opt);
            });
        }

        function filterChannels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
            renderSelect(filtered);
        }

        function playChannel() {
            const streamId = document.getElementById('channelSelect').value;
            const videoUrl = `http://starter.nvisionbd.net/live/talukderrudronil/talRudronil8/${streamId}.m3u8`;
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                if(window.hls) window.hls.destroy();
                window.hls = new Hls();
                window.hls.loadSource(videoUrl);
                window.hls.attachMedia(video);
                video.play();
            }
        }

        fetchChannels();
    </script>
</body>
</html>
