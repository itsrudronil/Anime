<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Xtream Codes Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        video { width: 100%; max-width: 800px; background: black; }
    </style>
</head>
<body>

    <h2>Xtream Codes Player</h2>
    
    <select id="catSelect" onchange="loadChannels()">
        <option>ক্যাটাগরি সিলেক্ট করুন...</option>
    </select>
    
    <select id="channelSelect" onchange="playChannel()">
        <option>চ্যানেল সিলেক্ট করুন...</option>
    </select>

    <video id="video" controls autoplay></video>

    <script>
        // আপনার Xtream Code এর ডিটেইলস এখানে বসান
        const BASE_URL = 'https://starter.nvisionbd.net';
        const USERNAME = 'talkulderrudronil';
        const PASSWORD = 'talRudronil8';

        // ১. ক্যাটাগরি লোড করা
        async function loadCategories() {
            const url = `${BASE_URL}/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=get_live_categories`;
            const response = await fetch(url);
            const data = await response.json();
            
            const catSelect = document.getElementById('catSelect');
            data.forEach(cat => {
                let opt = document.createElement('option');
                opt.value = cat.category_id;
                opt.innerHTML = cat.category_name;
                catSelect.appendChild(opt);
            });
        }

        // ২. ক্যাটাগরি অনুযায়ী চ্যানেল লোড করা
        async function loadChannels() {
            const catId = document.getElementById('catSelect').value;
            const url = `${BASE_URL}/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=get_live_streams&category_id=${catId}`;
            const response = await fetch(url);
            const data = await response.json();
            
            const chanSelect = document.getElementById('channelSelect');
            chanSelect.innerHTML = '<option>চ্যানেল সিলেক্ট করুন...</option>';
            data.forEach(stream => {
                let opt = document.createElement('option');
                opt.value = stream.stream_id;
                opt.innerHTML = stream.name;
                chanSelect.appendChild(opt);
            });
        }

        // ৩. ভিডিও প্লে করা
        function playChannel() {
            const streamId = document.getElementById('channelSelect').value;
            const videoUrl = `${BASE_URL}/live/${USERNAME}/${PASSWORD}/${streamId}.m3u8`;
            const video = document.getElementById('video');
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(videoUrl);
                hls.attachMedia(video);
                video.play();
            }
        }

        loadCategories();
    </script>
</body>
</html>
