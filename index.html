<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Live TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        select { width: 90%; max-width: 400px; padding: 10px; margin-bottom: 20px; }
        video { width: 100%; max-width: 800px; background: black; border: 2px solid #444; }
    </style>
</head>
<body>

    <h1>Live TV Portal</h1>
    
    <select id="channelSelect" onchange="playSelected()">
        <option>চ্যানেল সিলেক্ট করুন</option>
    </select>
    <br>
    <video id="video" controls autoplay></video>

    <script>
        const M3U_URL = 'https://raw.githubusercontent.com/bugsfreeweb/LiveTVCollector/refs/heads/main/LiveTV/Bangladesh/LiveTV.m3u';
        const video = document.getElementById('video');
        const select = document.getElementById('channelSelect');
        let hls;

        async function fetchM3U() {
            try {
                // এখানে corsproxy ব্যবহার করা হয়েছে যাতে ব্রাউজার ব্লক না করে
                const response = await fetch('https://corsproxy.io/?' + encodeURIComponent(M3U_URL));
                const text = await response.text();
                const lines = text.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1];
                        const url = lines[i + 1];
                        if (url && url.startsWith('http')) {
                            let option = document.createElement('option');
                            option.text = name;
                            option.value = url;
                            select.add(option);
                        }
                    }
                }
            } catch (e) { alert("লিংক লোড করতে সমস্যা হয়েছে!"); }
        }

        function playSelected() {
            const url = select.value;
            if (!url || url === 'চ্যানেল সিলেক্ট করুন') return;
            
            if (hls) hls.destroy();
            hls = new Hls();
            // ভিডিও প্লে করার সময়ও প্রক্সি ব্যবহার করা হচ্ছে
            hls.loadSource('https://corsproxy.io/?' + encodeURIComponent(url));
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }

        fetchM3U();
    </script>
</body>
</html>
