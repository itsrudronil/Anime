<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        input, select { width: 100%; max-width: 500px; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        video { width: 100%; max-width: 800px; background: black; display: block; margin: 0 auto; border-radius: 8px; border: 2px solid #334155; }
    </style>
</head>
<body>

    <h2>লাইভ টিভি পোর্টাল</h2>
    
    <input type="text" id="searchInput" placeholder="চ্যানেল সার্চ করুন..." onkeyup="filterChannels()">
    
    <select id="channelSelect" onchange="playChannel()">
        <option>চ্যানেল লোড হচ্ছে...</option>
    </select>
    
    <video id="video" controls autoplay></video>

    <script>
        const M3U_URL = 'http://starter.nvisionbd.net/get.php?username=talukderrudronil&password=talRudronil8&type=m3u_plus&output=ts';
        let allChannels = []; // সব চ্যানেল এখানে সেভ থাকবে

        async function loadChannels() {
            try {
                const response = await fetch(M3U_URL + '?t=' + new Date().getTime());
                const data = await response.text();
                const lines = data.split('\n');
                
                let currentName = '';
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF')) {
                        currentName = line.split(',')[1];
                    } else if (line.startsWith('http')) {
                        allChannels.push({ name: currentName, url: line });
                        currentName = '';
                    }
                });
                renderSelect(allChannels);
            } catch (e) {
                alert("চ্যানেল লিস্ট লোড হয়নি!");
            }
        }

        function renderSelect(channels) {
            const select = document.getElementById('channelSelect');
            select.innerHTML = '<option>চ্যানেল সিলেক্ট করুন</option>';
            channels.forEach(ch => {
                let opt = document.createElement('option');
                opt.value = ch.url;
                opt.innerHTML = ch.name;
                select.appendChild(opt);
            });
        }

        function filterChannels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
            renderSelect(filtered);
        }

        function playChannel() {
            const url = document.getElementById('channelSelect').value;
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                if(window.hls) window.hls.destroy();
                window.hls = new Hls();
                window.hls.loadSource(url);
                window.hls.attachMedia(video);
                video.play();
            }
        }

        loadChannels();
    </script>
</body>
</html>
