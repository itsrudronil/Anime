<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { margin-bottom: 20px; font-size: 26px; color: #38bdf8; }
        .container { width: 100%; max-width: 800px; }
        select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #1e293b; 
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            outline: none; 
        }
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }
        .error-msg { 
            color: #ef4444; 
            margin-top: 15px; 
            font-size: 14px; 
            text-align: center; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>লাইভ টিভি পোর্টাল</h1>
        
        <select id="channelSelect" onchange="playSelected()">
            <option value="">চ্যানেল লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</option>
        </select>
        
        <div class="video-wrapper">
            <video id="video" controls></video>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // আপনার GitHub Raw লিংক
        const M3U_URL = 'https://raw.githubusercontent.com/bugsfreeweb/LiveTVCollector/refs/heads/main/LiveTV/Bangladesh/LiveTV.m3u';
        
        const video = document.getElementById('video');
        const select = document.getElementById('channelSelect');
        const errorMsg = document.getElementById('errorMsg');
        let hls;

        // চ্যানেল লিস্ট লোড করার ফাংশন
        async function fetchM3U() {
            try {
                // allorigins proxy এবং cache-busting (টাইমস্ট্যাম্প) ব্যবহার করা হয়েছে
                const timestamp = new Date().getTime();
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(M3U_URL)}&t=${timestamp}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Network Issue');
                
                const text = await response.text();
                parseM3U(text);
            } catch (e) {
                errorMsg.innerText = "চ্যানেল লিস্ট লোড হতে সমস্যা হয়েছে। পেজটি রিফ্রেশ করুন।";
                select.innerHTML = '<option value="">লোড ফেইলড</option>';
            }
        }

        // M3U ফাইল পার্স করে সিলেক্ট মেনুতে বসানোর ফাংশন
        function parseM3U(data) {
            const lines = data.split('\n');
            select.innerHTML = '<option value="">চ্যানেল সিলেক্ট করুন</option>';
            
            let currentName = '';
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF')) {
                    const parts = line.split(',');
                    currentName = parts.length > 1 ? parts[1].trim() : 'Unknown Channel';
                } else if (line.startsWith('http')) {
                    let option = document.createElement('option');
                    option.text = currentName;
                    option.value = line;
                    select.add(option);
                    currentName = ''; 
                }
            }
        }

        // চ্যানেল প্লে করার ফাংশন
        function playSelected() {
            const url = select.value;
            errorMsg.innerText = ''; // আগের এরর মুছে ফেলা
            
            if (!url) return;

            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => {
                        console.log("অটোপ্লে ব্রাউজার থেকে ব্লক করা হয়েছে।");
                    });
                });

                // লাইভ টিভি এরর হ্যান্ডলিং
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                errorMsg.innerText = "এই চ্যানেলটির সার্ভার বর্তমানে ডাউন আছে বা সিকিউরিটির কারণে প্লে হচ্ছে না। অন্য চ্যানেল চেষ্টা করুন।";
                                hls.destroy();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari ব্রাউজারের জন্য
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // স্ক্রিপ্ট শুরু করা
        fetchM3U();
    </script>
</body>
</html>
