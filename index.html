<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { margin-bottom: 20px; font-size: 26px; color: #38bdf8; }
        .container { width: 100%; max-width: 800px; }
        select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #1e293b; 
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            outline: none; 
        }
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }
        .error-msg { 
            color: #ef4444; 
            margin-top: 15px; 
            font-size: 14px; 
            text-align: center; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>লাইভ টিভি পোর্টাল</h1>
        
        <select id="channelSelect" onchange="playSelected()">
            <option value="">চ্যানেল লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</option>
        </select>
        
        <div class="video-wrapper">
            <video id="video" controls></video>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
                const M3U_URL = 'https://raw.githubusercontent.com/bugsfreeweb/LiveTVCollector/refs/heads/main/LiveTV/Bangladesh/LiveTV.m3u';
        
        const video = document.getElementById('video');
        const select = document.getElementById('channelSelect');
        const errorMsg = document.getElementById('errorMsg');
        let hls;

        async function fetchM3U() {
            try {
                // ধাপ ১: সরাসরি চেষ্টা করা (GitHub Raw সাধারণত CORS অ্যালাউ করে)
                let response = await fetch(M3U_URL + '?t=' + new Date().getTime());
                let text = '';

                if (response.ok) {
                    text = await response.text();
                } else {
                    // ধাপ ২: সরাসরি কাজ না করলে Proxy ব্যবহার করা
                    console.log("Direct fetch failed, trying proxy...");
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(M3U_URL)}`;
                    response = await fetch(proxyUrl);
                    const data = await response.json();
                    if (data && data.contents) {
                        text = data.contents;
                    } else {
                        throw new Error('Proxy failed to load content');
                    }
                }
                
                parseM3U(text);

            } catch (e) {
                console.error("Error loading M3U:", e);
                errorMsg.innerText = "চ্যানেল লিস্ট লোড হতে সমস্যা হয়েছে। অরিজিনাল লিংকটি হয়তো কাজ করছে না।";
                select.innerHTML = '<option value="">লোড ফেইলড</option>';
            }
        }

        function parseM3U(data) {
            if (!data) return;
            const lines = data.split('\n');
            select.innerHTML = '<option value="">চ্যানেল সিলেক্ট করুন</option>';
            
            let currentName = '';
            let channelCount = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF')) {
                    const parts = line.split(',');
                    currentName = parts.length > 1 ? parts[1].trim() : 'Unknown Channel';
                } else if (line.startsWith('http')) {
                    let option = document.createElement('option');
                    option.text = currentName;
                    option.value = line;
                    select.add(option);
                    currentName = ''; 
                    channelCount++;
                }
            }

            if (channelCount === 0) {
                errorMsg.innerText = "ফাইলটি লোড হয়েছে কিন্তু কোনো চ্যানেল পাওয়া যায়নি।";
                select.innerHTML = '<option value="">চ্যানেল নেই</option>';
            }
        }

        function playSelected() {
            const url = select.value;
            errorMsg.innerText = ''; 
            
            if (!url) return;

            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => {
                        console.log("অটোপ্লে ব্রাউজার থেকে ব্লক করা হয়েছে।");
                    });
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                errorMsg.innerText = "এই চ্যানেলটির সার্ভার বর্তমানে ডাউন আছে বা ব্রাউজারে ব্লক করা হয়েছে।";
                                hls.destroy();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        fetchM3U();

    </script>
</body>
</html>
