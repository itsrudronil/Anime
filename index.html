<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Live TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        input { width: 300px; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        select { width: 320px; padding: 10px; border-radius: 5px; }
        video { width: 100%; max-width: 800px; background: black; margin-top: 20px; border: 2px solid #444; }
    </style>
</head>
<body>

    <h1>Live TV Portal</h1>
    <input type="text" id="searchInput" placeholder="চ্যানেল সার্চ করুন..." onkeyup="filterChannels()">
    <br>
    <select id="channelSelect" onchange="playSelected()">
        <option>লিংক লোড হচ্ছে...</option>
    </select>

    <br>
    <video id="video" controls autoplay></video>

    <script>
        const M3U_URL = 'https://is.gd/yQuS1g'; // তোমার দেওয়া লিংক
        const video = document.getElementById('video');
        const select = document.getElementById('channelSelect');
        const searchInput = document.getElementById('searchInput');
        let hls;
        let channelData = [];

        async function fetchM3U() {
            try {
                const response = await fetch('https://corsproxy.io/?' + encodeURIComponent(M3U_URL));
                const text = await response.text();
                parseM3U(text);
            } catch (e) { alert("লিংক লোড করতে সমস্যা হয়েছে।"); }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i + 1];
                    channelData.push({ name, url });
                }
            }
            updateSelect(channelData);
        }

        function updateSelect(list) {
            select.innerHTML = '<option>চ্যানেল সিলেক্ট করুন</option>';
            list.forEach(item => {
                let option = document.createElement('option');
                option.text = item.name;
                option.value = item.url;
                select.add(option);
            });
        }

        function filterChannels() {
            const query = searchInput.value.toLowerCase();
            const filtered = channelData.filter(c => c.name.toLowerCase().includes(query));
            updateSelect(filtered);
        }

        function playSelected() {
            const url = select.value;
            if (!url || url === 'চ্যানেল সিলেক্ট করুন') return;
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }

        fetchM3U();
    </script>
</body>
</html>
