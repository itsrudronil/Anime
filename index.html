<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 15px; text-align: center; }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; }
        video { width: 100%; max-width: 800px; background: black; display: block; margin: 20px auto; border-radius: 8px; border: 2px solid #334155; }
    </style>
</head>
<body>

    <h2>Live TV Player</h2>
    
    <select id="catSelect" onchange="loadChannels()">
        <option>ক্যাটাগরি সিলেক্ট করুন...</option>
    </select>
    
    <select id="channelSelect" onchange="playChannel()">
        <option>চ্যানেল সিলেক্ট করুন...</option>
    </select>

    <video id="video" controls autoplay></video>

    <script>
        const BASE_URL = 'http://starter.nvisionbd.net';
        const USERNAME = 'talukderrudronil';
        const PASSWORD = 'talRudronil8';

        // আগের fetchAPI ফাংশনটি সরিয়ে এটি বসান
async function fetchAPI(action, extraParams = '') {
    const url = `${BASE_URL}/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=${action}${extraParams}`;
    
    // এখানে আমরা corsproxy.io ব্যবহার করছি যা খুব শক্তিশালী
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    
    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
    } catch (error) {
        console.error("API Error:", error);
        throw error;
    }
}



        async function loadCategories() {
            try {
                const data = await fetchAPI('get_live_categories');
                const catSelect = document.getElementById('catSelect');
                catSelect.innerHTML = '<option>ক্যাটাগরি সিলেক্ট করুন</option>';
                data.forEach(cat => {
                    let opt = document.createElement('option');
                    opt.value = cat.category_id;
                    opt.innerHTML = cat.category_name;
                    catSelect.appendChild(opt);
                });
            } catch (e) {
                console.error(e);
                alert("সার্ভার থেকে ডেটা আসছে না। দয়া করে ইন্টারনেট কানেকশন চেক করুন।");
            }
        }

        async function loadChannels() {
            const catId = document.getElementById('catSelect').value;
            const data = await fetchAPI('get_live_streams', `&category_id=${catId}`);
            
            const chanSelect = document.getElementById('channelSelect');
            chanSelect.innerHTML = '<option>চ্যানেল সিলেক্ট করুন...</option>';
            data.forEach(stream => {
                let opt = document.createElement('option');
                opt.value = stream.stream_id;
                opt.innerHTML = stream.name;
                chanSelect.appendChild(opt);
            });
        }

        function playChannel() {
            const streamId = document.getElementById('channelSelect').value;
            const videoUrl = `${BASE_URL}/live/${USERNAME}/${PASSWORD}/${streamId}.m3u8`;
            const video = document.getElementById('video');
            
            if (Hls.isSupported()) {
                if(window.hls) window.hls.destroy();
                window.hls = new Hls();
                window.hls.loadSource(videoUrl);
                window.hls.attachMedia(video);
                video.play();
            }
        }

        loadCategories();
    </script>
</body>
</html>
