<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        select { width: 100%; max-width: 500px; padding: 12px; margin-bottom: 20px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; }
        video { width: 100%; max-width: 800px; background: black; display: block; margin: 0 auto; border-radius: 8px; border: 2px solid #334155; }
    </style>
</head>
<body>

    <h2>লাইভ টিভি পোর্টাল</h2>
    <select id="channelSelect" onchange="playChannel()">
        <option>চ্যানেল লোড হচ্ছে...</option>
    </select>
    <video id="video" controls autoplay></video>

    <script>
        // আপনার GitHub M3U লিংক
        const M3U_URL = 'https://raw.githubusercontent.com/bugsfreeweb/LiveTVCollector/refs/heads/main/LiveTV/Bangladesh/LiveTV.m3u';
        
        async function loadChannels() {
            try {
                // প্রতিটি রিকোয়েস্টে নতুন টাইমস্ট্যাম্প যোগ করা হয়েছে যেন ক্যাশ না হয়
                const response = await fetch(M3U_URL + '?t=' + new Date().getTime());
                const data = await response.text();
                
                const lines = data.split('\n');
                const select = document.getElementById('channelSelect');
                select.innerHTML = '<option>চ্যানেল সিলেক্ট করুন</option>';
                
                let currentName = '';
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF')) {
                        currentName = line.split(',')[1];
                    } else if (line.startsWith('http')) {
                        let opt = document.createElement('option');
                        opt.value = line;
                        opt.innerHTML = currentName;
                        select.appendChild(opt);
                        currentName = '';
                    }
                });
            } catch (e) {
                alert("চ্যানেল লিস্ট লোড হয়নি! পেজটি রিফ্রেশ করুন।");
            }
        }

        function playChannel() {
            const url = document.getElementById('channelSelect').value;
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play();
            }
        }

        loadChannels();
    </script>
</body>
</html>
